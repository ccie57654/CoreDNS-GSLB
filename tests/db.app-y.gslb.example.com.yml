defaults:
  owner: admin
  record_ttl: 30
  scrape_interval: 10s
  scrape_retries: 1
  scrape_timeout: 5s
healthcheck_profiles:
  https_default:
    params:
      enable_tls: true
      expected_body: ""
      expected_code: 200
      headers: null
      host: localhost
      method: GET
      port: 443
      skip_tls_verify: true
      timeout: 5s
      uri: /
    type: http
records:
  webapp-geoip-country.app-y.gslb.example.com.:
    backends:
      - address: 172.16.0.10
        country: FR
        description: webapp10
        enable: true
        healthchecks:
          - https_default
        priority: 1
      - address: 172.16.0.11
        country: US
        description: webapp11
        enable: true
        healthchecks:
          - https_default
        priority: 2
    description: GeoIP-based routing by country (using MaxMind GeoLite2-Country.mmdb)
    mode: geoip
  webapp-geoip-loc.app-y.gslb.example.com.:
    backends:
      - address: 172.16.0.10
        description: webapp10
        enable: true
        healthchecks:
          - https_default
        location: eu-west-1
        priority: 1
      - address: 172.16.0.11
        description: webapp11
        enable: true
        healthchecks:
          - https_default
        location: eu-west-2
        priority: 2
    description: GeoIP-based routing between Paris and London backends
    mode: geoip

  webapp-geoip-city.app-y.gslb.example.com.:
    backends:
      - address: 172.16.0.10
        description: webapp10
        country: US
        subdivision: CA
        city: San Jose
        enable: true
        healthchecks:
          - https_default
      - address: 172.16.0.11
        description: webapp11
        country: US
        subdivision: NJ
        city: Oakland
        enable: true
        healthchecks:
          - https_default
      - address: 172.16.0.12
        description: webapp12
        country: CA
        subdivision: BC
        enable: true
        healthchecks:
          - https_default
      - address: 172.16.0.13
        description: webapp13
        continent: EU
    description: GeoIP-based routing multi geo distributed backends
    mode: geoip


    
